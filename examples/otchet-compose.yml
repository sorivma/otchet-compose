version: 1

document:
  output: "./build/lab-04.docx"
  reserve_title_page: true
  toc: true

content:
  - type: heading
    text: "Цель работы"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Целью работы является изучение принципов построения многомашинного стенда
      с использованием Vagrant, а также освоение подходов к развёртыванию
      распределённого приложения, состоящего из фронтенд-узла, backend-узла
      и сервера базы данных. В ходе выполнения работы необходимо исследовать
      способы описания виртуальной инфраструктуры в одном Vagrantfile,
      настроить сетевое взаимодействие между виртуальными машинами и проверить
      работоспособность развёрнутого программного комплекса.

  - type: paragraph
    text: >
      Дополнительной задачей является закрепление практических навыков
      автоматизации подготовки окружения. Особое внимание уделяется
      последовательности запуска узлов, распределению ролей между машинами,
      а также проверке корректного обмена данными между всеми компонентами стенда.

  - type: heading
    text: "Ход работы"
    level: 1
    structural: true

  - type: heading
    text: "Постановка задачи и проектирование стенда"
    level: 2
    structural: false

  - type: paragraph
    text: >
      На начальном этапе была проанализирована постановка лабораторной работы
      и определены ключевые требования к создаваемому стенду. В результате
      было решено использовать три виртуальные машины: front для размещения
      веб-интерфейса, back для выполнения серверной логики и db для хранения
      данных приложения. Такая схема позволяет разделить зоны ответственности
      между узлами и смоделировать архитектуру, близкую к реальной практике
      развертывания многокомпонентных систем.

  - type: paragraph
    text: >
      После выбора состава виртуальных машин была сформирована общая логика
      их взаимодействия. Пользовательский запрос должен поступать на front-узел,
      далее передаваться на backend-приложение и при необходимости обращаться
      к базе данных. Подобная организация позволяет наглядно проследить путь
      обработки запроса и понять, каким образом обеспечивается совместная
      работа всех элементов инфраструктуры.

  - type: figure
    path: "./images/stand-scheme.png"
    caption: "Схема многомашинного стенда"

  - type: heading
    text: "Подготовка конфигурации Vagrant"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Далее был разработан общий Vagrantfile, в котором описаны параметры
      всех трёх виртуальных машин. Для каждой из них были заданы имя,
      используемый box-образ, сетевые настройки и параметры провижининга.
      Такой подход позволил централизованно управлять развёртыванием стенда
      и обеспечил возможность запуска всей инфраструктуры одной командой.

  - type: paragraph
    text: >
      На этапе настройки особое внимание уделялось вопросу сетевой связности.
      Для корректного взаимодействия между узлами были определены внутренние
      IP-адреса, позволяющие обращаться к backend-приложению и базе данных
      по статически известным адресам. Благодаря этому каждый компонент стенда
      мог быть настроен заранее, без необходимости динамического поиска
      остальных участников системы.

  - type: figure
    path: "./images/vagrantfile-common.png"
    caption: "Общая конфигурация Vagrantfile"

  - type: heading
    text: "Настройка front-узла"
    level: 2
    structural: false

  - type: paragraph
    text: >
      После подготовки общего описания стенда был настроен front-узел.
      Его задачей являлась публикация пользовательского интерфейса
      и приём входящих HTTP-запросов. В рамках работы на данной виртуальной
      машине был установлен и настроен веб-сервер nginx, обеспечивающий
      отдачу статических файлов и взаимодействие с backend-узлом.

  - type: paragraph
    text: >
      Конфигурация front-узла включала автоматическую установку необходимых
      пакетов, создание рабочей директории приложения и размещение
      HTML-страницы, которая использовалась для тестирования стенда.
      Благодаря автоматизированной настройке стало возможно быстро
      пересоздавать виртуальную машину без ручного повторения всех действий.

  - type: figure
    path: "./images/front-config.png"
    caption: "Конфигурация front-узла"

  - type: heading
    text: "Настройка backend-узла"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Следующим этапом была подготовка backend-узла, на котором размещалось
      серверное приложение. Именно этот узел обеспечивал обработку запросов,
      поступающих с front-части, и взаимодействие с базой данных.
      Для развёртывания были выполнены установка необходимого программного
      окружения, копирование исходного кода и запуск приложения
      в автоматическом режиме.

  - type: paragraph
    text: >
      При конфигурации backend-узла были определены параметры подключения
      к базе данных, а также адрес, по которому сервер должен принимать
      входящие обращения. Отдельное внимание было уделено тому, чтобы
      приложение запускалось после подготовки окружения без необходимости
      ручного вмешательства пользователя. Это позволило приблизить
      лабораторный стенд к полноценному сценарию автоматического развёртывания.

  - type: figure
    path: "./images/backend-config.png"
    caption: "Конфигурация backend-узла"

  - type: heading
    text: "Настройка сервера базы данных"
    level: 2
    structural: false

  - type: paragraph
    text: >
      После этого был настроен узел db, предназначенный для размещения
      системы управления базами данных. На данной виртуальной машине
      была выполнена установка СУБД, создана структура базы данных
      и подготовены параметры доступа для backend-приложения.
      Наличие отдельного узла базы данных позволило реализовать
      более реалистичную архитектуру распределённой системы.

  - type: paragraph
    text: >
      Для обеспечения совместной работы узлов были заданы имя базы данных,
      пользователь и пароль, используемые backend-компонентом при подключении.
      Помимо этого была проверена доступность СУБД по внутреннему сетевому
      адресу. Такая проверка необходима для исключения ошибок, связанных
      с сетевой недоступностью или неверной настройкой параметров доступа.

  - type: figure
    path: "./images/db-config.png"
    caption: "Конфигурация сервера базы данных"

  - type: heading
    text: "Проверка взаимодействия компонентов"
    level: 2
    structural: false

  - type: paragraph
    text: >
      После завершения настройки всех виртуальных машин был выполнен запуск
      стенда и проведена проверка взаимодействия между его компонентами.
      В ходе тестирования подтверждалось, что front-узел успешно отдаёт
      пользовательский интерфейс, backend-узел корректно обрабатывает запросы,
      а сервер базы данных принимает соединения и возвращает необходимые данные.

  - type: paragraph
    text: >
      Проверка проводилась последовательно: сначала оценивалась доступность
      веб-страницы на front-узле, затем анализировалась передача запросов
      на backend, после чего контролировалось выполнение операций чтения
      и записи в базу данных. Такой подход позволил выявить возможные ошибки
      на каждом из уровней и убедиться в корректной работе всей системы в целом.

  - type: figure
    path: "./images/test-results.png"
    caption: "Результаты проверки работоспособности стенда"

  - type: heading
    text: "Анализ полученных результатов"
    level: 2
    structural: false

  - type: paragraph
    text: >
      По итогам выполнения лабораторной работы было установлено, что использование
      Vagrant существенно упрощает создание типовых виртуальных окружений
      и делает процесс развертывания многомашинного стенда воспроизводимым.
      Все ключевые действия по установке, настройке и запуску компонентов
      могут быть описаны декларативно, что повышает удобство сопровождения
      и повторного использования конфигурации.

  - type: paragraph
    text: >
      Кроме того, полученные результаты показывают, что даже сравнительно
      простой лабораторный стенд позволяет отработать базовые принципы
      инфраструктурной автоматизации: разделение ролей между узлами,
      настройку сетевого взаимодействия, автоматический провижининг
      и контроль корректности работы после запуска. Это делает подобные
      задания полезными для формирования практических навыков
      развёртывания распределённых приложений.

  - type: heading
    text: "Заключение"
    level: 1
    structural: true

  - type: paragraph
    text: >
      В ходе выполнения лабораторной работы были изучены возможности Vagrant
      по созданию собственных box-образов и развертыванию многомашинного стенда
      на их основе. Были подготовлены отдельные виртуальные машины
      для фронтенда, серверного приложения и базы данных, после чего
      они были объединены в единую рабочую инфраструктуру с автоматической настройкой.

  - type: paragraph
    text: >
      Проведённая проверка показала корректное взаимодействие между всеми узлами,
      успешное отображение данных на front-части и правильную обработку запросов
      к базе данных через backend-приложение. Таким образом, поставленная цель
      работы была достигнута, а основные механизмы организации многомашинного
      стенда были успешно освоены на практике.