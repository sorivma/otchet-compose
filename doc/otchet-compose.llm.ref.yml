# ============================================================
# REFERENCE YAML FOR LLM
# Формат конфигурации otchet-compose для генерации отчёта
#
# Назначение:
# - сгенерировать DOCX-отчёт по лабораторной работе;
# - первая страница резервируется под титульный лист;
# - далее идут: содержание, цель работы, ход работы, заключение;
# - внутри "Ход работы" допускаются обычные подзаголовки;
# - рисунки нумеруются автоматически генератором;
# - если path у рисунка не указан, будет вставлен placeholder.
#
# ВАЖНО ДЛЯ LLM:
# 0. Титульный лист задаётся через document.title_page, а не через content.
#    Если title_page указан, reserve_title_page не нужен.
#    Доступные встроенные шаблоны: mirea
#    Пользователь может добавить собственный .docx шаблон в ~/.otchet-compose/templates/.
#    Параметры шаблона передаются через title_page.params (ключ: значение).
#    В .docx шаблонах плейсхолдеры записываются как {{key}}.
# 1. Всегда сохраняй три основных структурных заголовка:
#    - "Цель работы"
#    - "Ход работы"
#    - "Заключение"
# 2. Эти заголовки должны быть level: 1 и structural: true
# 3. Внутренние подзаголовки внутри "Ход работы" должны быть:
#    - level: 2
#    - structural: false
# 4. Каждый смысловой абзац делай отдельным блоком type: paragraph
# 5. Для paragraph.text используй folded scalar ">".
#    Это важно: текст будет читаться удобно в YAML и не даст
#    лишних переносов строк в Word.
# 6. Подпись рисунка пиши БЕЗ номера:
#    правильно: "Схема стенда"
#    неправильно: "Рисунок 1 – Схема стенда"
# 7. Если путь к изображению неизвестен, path можно не указывать.
# 8. Не добавляй новые типы блоков, если они не поддерживаются.
# 9. Для перечислений используй type: list.
#    - style: bullet  — маркированный список (маркер –)
#    - style: numeric — нумерованный список (1), 2), …)
#    Каждый элемент items — отдельная строка.
#    Не используй обычные абзацы для перечислений.
# 10. Для таблиц используй type: table.
#    - caption — подпись таблицы БЕЗ номера (номер добавляется автоматически).
#      Правильно: "Параметры конфигурации"
#      Неправильно: "Таблица 1 – Параметры конфигурации"
#    - headers — список заголовков столбцов (непустой).
#    - rows — список строк; каждая строка — список ячеек.
#      Количество ячеек в каждой строке должно совпадать с числом заголовков.
#    Подпись выводится НАД таблицей, выровнена по правому краю.
#    Заголовочная строка — жирная, по центру.
#    Ячейки данных — обычные, по левому краю.
#
# Поддерживаемые типы блоков:
# - heading
# - paragraph
# - figure
# - list
# - table
# ============================================================

version: 1

document:
  # Итоговый путь к DOCX-файлу
  output: "./build/report.docx"

  # Титульный лист из шаблона (опционально).
  # При наличии title_page поле reserve_title_page не нужно.
  # Встроенные шаблоны: mirea
  # Свои шаблоны (.docx с плейсхолдерами {{key}}) кладут в ~/.otchet-compose/templates/
  title_page:
    template: mirea
    params:
      institute: "Институт информационных технологий"
      department: "Кафедра общей информатики"
      discipline: "Название дисциплины"
      work_type: "ОТЧЁТ ПО ЛАБОРАТОРНОЙ РАБОТЕ"
      work_number: "№ 1"
      work_title: "Название работы"   # опционально
      student: "Фамилия И.О."
      group: "ИКБО-01-22"
      teacher: "Фамилия И.О."
      year: "2025"

  # true -> оставить пустую первую страницу под титульник (не нужно при наличии title_page)
  reserve_title_page: false

  # true -> вставить автоматическое оглавление
  toc: true

content:
  # ==========================================================
  # 1. ЦЕЛЬ РАБОТЫ
  # Обязательный структурный заголовок
  # ==========================================================
  - type: heading
    text: "Цель работы"
    level: 1
    structural: true

  - type: paragraph
    text: >
      Целью работы является изучение темы лабораторной работы,
      освоение используемых инструментов, а также получение
      практических навыков выполнения основных этапов задания.

  - type: paragraph
    text: >
      В ходе выполнения работы необходимо рассмотреть теоретические
      основы исследуемого вопроса, выполнить последовательность
      практических действий и проанализировать полученные результаты.

  # ==========================================================
  # 2. ХОД РАБОТЫ
  # Обязательный структурный заголовок
  # ==========================================================
  - type: heading
    text: "Ход работы"
    level: 1
    structural: true

  # Внутренний подзаголовок
  - type: heading
    text: "Постановка задачи"
    level: 2
    structural: false

  - type: paragraph
    text: >
      На первом этапе была рассмотрена постановка лабораторной работы,
      определены исходные требования, входные данные и ожидаемый результат.
      Это позволило сформировать общее представление о структуре задания
      и последовательности его выполнения.

  - type: heading
    text: "Подготовка исходных данных"
    level: 2
    structural: false

  - type: paragraph
    text: >
      Далее была выполнена подготовка исходных данных и рабочей среды.
      На этом этапе настраивались необходимые инструменты, проверялась
      корректность исходных параметров и подготавливались материалы,
      используемые при дальнейшем выполнении лабораторной работы.

  - type: figure
    path: "./images/source-data.png"
    caption: "Подготовка исходных данных"

  - type: heading
    text: "Перечень используемых инструментов"
    level: 2
    structural: false

  - type: paragraph
    text: >
      В ходе выполнения работы применялись следующие инструменты и технологии.

  - type: list
    style: bullet
    items:
      - "Первый инструмент или технология"
      - "Второй инструмент или технология"
      - "Третий инструмент или технология"

  - type: paragraph
    text: >
      Последовательность выполнения основных шагов:

  - type: list
    style: numeric
    items:
      - "Первый шаг выполнения задания"
      - "Второй шаг выполнения задания"
      - "Третий шаг выполнения задания"

  # Таблица — подпись автоматически "Таблица N – …", выводится над таблицей.
  # Количество ячеек в каждой строке rows должно совпадать с числом headers.
  - type: table
    caption: "Сравнение используемых инструментов"
    headers:
      - "Инструмент"
      - "Назначение"
      - "Версия"
    rows:
      - ["Первый инструмент",  "Краткое описание роли", "1.0"]
      - ["Второй инструмент",  "Краткое описание роли", "2.3"]
      - ["Третий инструмент",  "Краткое описание роли", "4.1"]

  - type: heading
    text: "Выполнение основных этапов"
    level: 2
    structural: false

  - type: paragraph
    text: >
      После подготовки среды были последовательно выполнены основные этапы
      лабораторной работы. Каждый этап сопровождался анализом промежуточных
      результатов, проверкой корректности выполненных действий и при
      необходимости внесением изменений в настройки или параметры.

  - type: paragraph
    text: >
      В процессе выполнения задания были получены результаты, позволяющие
      оценить работоспособность выбранного подхода и подтвердить достижение
      поставленной цели. Особое внимание уделялось правильности выполнения
      шагов и соответствию результата условиям лабораторной работы.

  - type: figure
    caption: "Результат выполнения одного из этапов"

  - type: heading
    text: "Анализ полученных результатов"
    level: 2
    structural: false

  - type: paragraph
    text: >
      На заключительном этапе хода работы были проанализированы полученные
      результаты. Было установлено, что выполненные действия позволяют
      решить поставленную задачу, а выбранные методы и инструменты
      являются применимыми в рамках рассматриваемой лабораторной работы.

  # ==========================================================
  # 3. ЗАКЛЮЧЕНИЕ
  # Обязательный структурный заголовок
  # ==========================================================
  - type: heading
    text: "Заключение"
    level: 1
    structural: true

  - type: paragraph
    text: >
      В ходе выполнения лабораторной работы были изучены основные
      теоретические положения по рассматриваемой теме, а также получены
      практические навыки выполнения ключевых этапов задания.

  - type: paragraph
    text: >
      Поставленная цель работы была достигнута. Полученные результаты
      подтверждают корректность выполненных действий и позволяют сделать
      вывод о том, что рассматриваемые методы и инструменты могут быть
      успешно применены при решении аналогичных задач.